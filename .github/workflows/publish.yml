# Publishes the package to npm with a provenance statement on every GitHub
# release. n8n verification (from May 2026) requires provenance-published
# packages - local `npm publish` is not accepted.
#
# Setup: in the GitHub repo settings add an NPM_TOKEN secret (npm automation
# token with publish rights), then create a release to publish.
name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
